name: Build TakerTap APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # ручной запуск из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Получаем код
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java для apktool
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Скачиваем apktool
      - name: Download apktool
        run: |
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.11.1/apktool_2.11.1.jar \
            -o apktool.jar

      # 4. Распаковываем оригинальный APK
      - name: Decode original APK from secret
        env:
          ORIGINAL_APK_B64: ${{ secrets.ORIGINAL_APK_B64 }}
        run: |
          echo "$ORIGINAL_APK_B64" | base64 -d > TapTaxi_final.apk

      # 5. Декомпилируем
      - name: Decompile APK
        run: |
          java -jar apktool.jar d TapTaxi_final.apk -o decompiled -f

      # 6. Применяем smali-патчи
      - name: Apply smali patches
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          SMALI_DIR="decompiled/smali_classes3/com/soft373/taxi/services"
          
          # Копируем AutoAcceptHelper (новые файлы)
          cp smali_patches/AutoAcceptHelper.smali "$SMALI_DIR/"
          cp "smali_patches/AutoAcceptHelper\$SyncRunnable.smali" "$SMALI_DIR/"
          
          # Патчим NewOrdersService и NewOrdersServiceBase
          cp smali_patches/NewOrdersService.smali "$SMALI_DIR/"
          cp smali_patches/NewOrdersServiceBase.smali "$SMALI_DIR/"
          
          # Подставляем VPS_IP и API_TOKEN в AutoAcceptHelper
          sed -i "s|http://YOUR_VPS_IP:8080|http://${VPS_IP}:8080|g" "$SMALI_DIR/AutoAcceptHelper.smali"
          sed -i "s|change_me_in_env|${API_TOKEN}|g" "$SMALI_DIR/AutoAcceptHelper.smali"
          
          echo "Патчи применены. Проверка:"
          grep -n "VPS_IP\|YOUR_VPS\|change_me" "$SMALI_DIR/AutoAcceptHelper.smali" || echo "OK — плейсхолдеры заменены"

      # 7. Собираем APK
      - name: Build APK
        run: |
          java -jar apktool.jar b decompiled -o TakerTap_unsigned.apk

      # 8. Подпись APK
      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'takertap' }}
          KEY_PASS: ${{ secrets.KEY_PASS || 'android123' }}
          STORE_PASS: ${{ secrets.STORE_PASS || 'android123' }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > takertap.jks
          
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore takertap.jks \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -signedjar TakerTap_signed.apk \
            TakerTap_unsigned.apk \
            "$KEY_ALIAS"

      # 9. Загружаем APK как артефакт
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TakerTap-signed-${{ github.run_number }}
          path: TakerTap_signed.apk
          retention-days: 30
